document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

l;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"57c567ab-bd8c-48b9-a6ce-d9bcd11c6270\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3a440d9d-b049-4d43-82ad-7040f6d2cbd4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"70f4501d-368c-431f-86a6-07fd19143e62\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   HIGH AGENCY — Waitlist / Operator's Console\n   Design system: near-black canvas, bone type, ignition accent\n   ============================================================ */\n\n:root {\n  /* Color */\n  --ink:      #09090A;   /* page background */\n  --ink-2:    #0F0F11;   /* raised panels */\n  --ink-3:    #16161A;   /* hover / inset */\n  --bone:     #ECE7DC;   /* primary text (warm off-white) */\n  --bone-dim: #9A968C;   /* secondary text */\n  --bone-faint:#5B584F;  /* tertiary / labels */\n  --ignite:   #FF5A1E;   /* signal accent */\n  --ignite-2: #FF7A45;   /* accent hover */\n  --ember:    rgba(255, 90, 30, 0.12);\n  --line:     rgba(236, 231, 220, 0.10);\n  --line-2:   rgba(236, 231, 220, 0.18);\n  --good:     #58C98A;\n\n  /* Type */\n  --display: \"Space Grotesk\", \"Helvetica Neue\", sans-serif;\n  --mono:    \"JetBrains Mono\", ui-monospace, monospace;\n  --serif:   \"Instrument Serif\", Georgia, serif;\n\n  /* Metrics */\n  --maxw: 1240px;\n  --gutter: clamp(20px, 5vw, 64px);\n  --radius: 4px;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }\n\nbody {\n  background: var(--ink);\n  color: var(--bone);\n  font-family: var(--display);\n  font-size: 18px;\n  line-height: 1.5;\n  letter-spacing: -0.01em;\n  overflow-x: hidden;\n  /* fine technical grid + vignette */\n  background-image:\n    radial-gradient(120% 80% at 50% -10%, rgba(255,90,30,0.06), transparent 60%),\n    linear-gradient(var(--line) 1px, transparent 1px),\n    linear-gradient(90deg, var(--line) 1px, transparent 1px);\n  background-size: auto, 64px 64px, 64px 64px;\n  background-position: center top;\n}\n\n::selection { background: var(--ignite); color: #0a0a0a; }\n\na { color: inherit; text-decoration: none; }\nimg { display: block; max-width: 100%; }\nbutton { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }\n\n/* ---------- Layout helpers ---------- */\n.wrap { max-width: var(--maxw); margin: 0 auto; padding-left: var(--gutter); padding-right: var(--gutter); }\n.section { padding: clamp(72px, 11vw, 140px) 0; position: relative; }\n.divider { height: 1px; background: var(--line); width: 100%; }\n\n/* ---------- Typographic primitives ---------- */\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 12px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--bone-faint);\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n}\n.eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ignite); box-shadow: 0 0 12px var(--ignite); }\n.eyebrow--ignite { color: var(--ignite); }\n\nh1, h2, h3 { font-weight: 600; line-height: 1.02; letter-spacing: -0.03em; }\n.display {\n  font-size: clamp(44px, 8.5vw, 116px);\n  font-weight: 600;\n  line-height: 0.94;\n  letter-spacing: -0.04em;\n}\n.h2 { font-size: clamp(32px, 5vw, 60px); letter-spacing: -0.035em; }\n.h3 { font-size: clamp(22px, 2.6vw, 30px); letter-spacing: -0.02em; }\n.serif-em { font-family: var(--serif); font-style: italic; font-weight: 400; letter-spacing: -0.01em; }\n.ig { color: var(--ignite); }\n.lead { font-size: clamp(18px, 2.1vw, 23px); color: var(--bone-dim); line-height: 1.55; max-width: 60ch; }\n.mono { font-family: var(--mono); }\n.kicker { font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--bone-faint); }\n\n/* ---------- Buttons ---------- */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n  font-family: var(--mono); font-size: 13px; font-weight: 600;\n  letter-spacing: 0.08em; text-transform: uppercase;\n  padding: 16px 26px; border-radius: var(--radius);\n  transition: transform .15s ease, background .15s ease, color .15s ease, box-shadow .15s ease;\n}\n.btn--primary { background: var(--ignite); color: #0a0a0a; box-shadow: 0 0 0 0 var(--ember); }\n.btn--primary:hover { background: var(--ignite-2); transform: translateY(-1px); box-shadow: 0 12px 30px -12px var(--ignite); }\n.btn--ghost { border: 1px solid var(--line-2); color: var(--bone); }\n.btn--ghost:hover { border-color: var(--ignite); color: var(--ignite); }\n.btn--block { width: 100%; }\n.btn .arr { transition: transform .15s ease; }\n.btn:hover .arr { transform: translateX(3px); }\n\n/* ---------- Nav ---------- */\n.nav {\n  position: sticky; top: 0; z-index: 50;\n  backdrop-filter: blur(12px);\n  background: linear-gradient(var(--ink), rgba(9,9,10,0.72));\n  border-bottom: 1px solid var(--line);\n}\n.nav__inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }\n.brand { display: flex; align-items: center; gap: 12px; font-family: var(--mono); font-weight: 700; letter-spacing: 0.04em; font-size: 14px; }\n.brand__mark {\n  width: 26px; height: 26px; border: 1.5px solid var(--bone); border-radius: 50%;\n  display: grid; place-items: center; position: relative;\n}\n.brand__mark::after { content:\"\"; width: 7px; height: 7px; border-radius: 50%; background: var(--ignite); box-shadow: 0 0 10px var(--ignite); }\n.nav__right { display: flex; align-items: center; gap: 22px; }\n.nav__links { display: flex; gap: 26px; }\n.nav__links a { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bone-dim); transition: color .15s; }\n.nav__links a:hover { color: var(--bone); }\n.nav__cta { padding: 10px 18px; font-size: 12px; }\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.hero { position: relative; padding-top: clamp(48px, 8vw, 96px); padding-bottom: clamp(56px, 8vw, 110px); overflow: hidden; }\n.hero__grid { display: grid; grid-template-columns: 1.35fr 1fr; gap: clamp(32px, 5vw, 72px); align-items: center; }\n.hero__tag { margin-bottom: 30px; }\n.hero h1 { margin-bottom: 28px; }\n.hero__sub { margin-bottom: 38px; max-width: 50ch; }\n.strike { position: relative; white-space: nowrap; }\n.strike::after { content:\"\"; position: absolute; left: -2%; right: -2%; top: 52%; height: 3px; background: var(--ignite); transform: rotate(-2deg); }\n\n/* email capture */\n.capture { display: flex; gap: 10px; max-width: 520px; flex-wrap: wrap; }\n.capture__field {\n  flex: 1 1 240px; display: flex; align-items: center; gap: 12px;\n  background: var(--ink-2); border: 1px solid var(--line-2); border-radius: var(--radius);\n  padding: 0 16px; transition: border-color .15s, box-shadow .15s;\n}\n.capture__field:focus-within { border-color: var(--ignite); box-shadow: 0 0 0 3px var(--ember); }\n.capture__field .pre { font-family: var(--mono); color: var(--bone-faint); font-size: 13px; }\n.capture input {\n  flex: 1; background: none; border: none; color: var(--bone);\n  font-family: var(--display); font-size: 16px; padding: 16px 0; outline: none; min-width: 0;\n}\n.capture input::placeholder { color: var(--bone-faint); }\n.capture .btn { flex: 0 0 auto; }\n.capture__note { margin-top: 16px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; color: var(--bone-faint); display: flex; gap: 18px; flex-wrap: wrap; }\n.capture__note b { color: var(--bone-dim); font-weight: 500; }\n\n/* hero console / radar */\n.console {\n  background: linear-gradient(160deg, var(--ink-2), #0b0b0d);\n  border: 1px solid var(--line-2); border-radius: 8px;\n  padding: 22px; position: relative; overflow: hidden;\n}\n.console__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }\n.console__head .kicker { color: var(--bone-dim); }\n.live { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: var(--good); }\n.live .blip { width: 7px; height: 7px; border-radius: 50%; background: var(--good); animation: blip 1.6s ease-in-out infinite; }\n@keyframes blip { 0%,100%{opacity:1; box-shadow:0 0 0 0 rgba(88,201,138,.5)} 50%{opacity:.55; box-shadow:0 0 0 5px rgba(88,201,138,0)} }\n\n.radar { position: relative; aspect-ratio: 1; width: 100%; max-width: 280px; margin: 6px auto 18px; border-radius: 50%;\n  background: radial-gradient(circle, rgba(255,90,30,0.05), transparent 70%);\n  border: 1px solid var(--line); }\n.radar::before, .radar::after { content:\"\"; position: absolute; border-radius: 50%; border: 1px solid var(--line); inset: 22%; }\n.radar::after { inset: 42%; }\n.radar__cross { position: absolute; inset: 0; }\n.radar__cross::before, .radar__cross::after { content:\"\"; position: absolute; background: var(--line); }\n.radar__cross::before { left: 50%; top: 0; bottom: 0; width: 1px; }\n.radar__cross::after { top: 50%; left: 0; right: 0; height: 1px; }\n.radar__sweep { position: absolute; inset: 0; border-radius: 50%;\n  ba }\n.footer__inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }\n.footer__links { display: flex; gap: 26px; }\n.footer__links a, .footer small { font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; color: var(--bone-faint); }\n.footer__links a:hover { color: var(--bone); }\n\n/* ============================================================\n   APPLICATION MODAL\n   ============================================================ */\n.modal { position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }\n.modal.open { display: flex; }\n.modal__scrim { position: absolute; inset: 0; background: rgba(5,5,6,0.78); backdrop-filter: blur(6px); animation: fade .2s ease; }\n@keyframes fade { from { opacity: 0; } }\n.modal__card {\n  position: relative; width: 100%; max-width: 540px; background: var(--ink-2);\n  border: 1px solid var(--line-2); border-radius: 12px; padding: clamp(26px,4vw,40px);\n  max-height: 92vh; overflow-y: auto; animation: pop .25s cubic-bezier(.2,.8,.2,1);\n}\n@keyframes pop { from { transform: translateY(14px) scale(.98); } }\n.modal__close { position: absolute; top: 18px; right: 18px; width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--line-2); display: grid; place-items: center; color: var(--bone-dim); transition: .15s; }\n.modal__close:hover { color: var(--bone); border-color: var(--bone-dim); }\n.modal__progress { display: flex; gap: 6px; margin-bottom: 24px; }\n.modal__progress span { height: 3px; flex: 1; background: var(--line-2); border-radius: 2px; transition: background .3s; }\n.modal__progress span.on { background: var(--ignite); }\n.modal__step { display: none; }\n.modal__step.active { display: block; }\n.modal h3 { font-size: clamp(24px,3vw,32px); margin-bottom: 8px; }\n.modal__sub { color: var(--bone-dim); font-size: 15.5px; margin-bottom: 26px; }\n.field { margin-bottom: 18px; }\n.field label { display: block; font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bone-faint); margin-bottom: 9px; }\n.field input, .field textarea, .field select {\n  width: 100%; background: var(--ink); border: 1px solid var(--line-2); border-radius: var(--radius);\n  color: var(--bone); font-family: var(--display); font-size: 16px; padding: 14px 16px; outline: none; transition: border-color .15s, box-shadow .15s;\n}\n.field textarea { resize: vertical; min-height: 92px; line-height: 1.5; }\n.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--ignite); box-shadow: 0 0 0 3px var(--ember); }\n.field input::placeholder, .field textarea::placeholder { color: var(--bone-faint); }\n.choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }\n.choice { display: flex; align-items: center; gap: 10px; border: 1px solid var(--line-2); border-radius: var(--radius); padding: 13px 14px; font-size: 14.5px; color: var(--bone-dim); transition: .15s; user-select: none; }\n.choice:hover { border-color: var(--bone-faint); color: var(--bone); }\n.choice.sel { border-color: var(--ignite); color: var(--bone); background: var(--ember); }\n.choice .tick { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--bone-faint); flex: 0 0 auto; }\n.choice.sel .tick { background: var(--ignite); border-color: var(--ignite); }\n.modal__err { color: var(--ignite); font-family: var(--mono); font-size: 12px; margin-bottom: 14px; display: none; }\n.modal__err.show { display: block; }\n.modal__actions { display: flex; gap: 12px; margin-top: 26px; }\n.modal__back { flex: 0 0 auto; }\n.modal__next { flex: 1; }\n\n/* success step */\n.success { text-align: center; }\n.success__seal { width: 76px; height: 76px; margin: 0 auto 22px; border-radius: 50%; border: 2px solid var(--ignite); display: grid; place-items: center; color: var(--ignite); animation: pop .4s cubic-bezier(.2,.8,.2,1); }\n.success__id { font-family: var(--mono); font-size: 13px; letter-spacing: 0.1em; color: var(--bone-dim); margin: 18px 0 6px; }\n.success__id b { color: var(--ignite); }\n.success__q { display: inline-flex; align-items: baseline; gap: 8px; margin-top: 8px; font-family: var(--mono); font-size: 13px; color: var(--bone-faint); }\n.success__q .n { font-size: 30px; color: var(--bone); font-weight: 700; letter-spacing: -0.02em; }\n\n/* ---------- Reveal animation ----------\n   Bulletproof: opacity stays 1 at all times, so a frozen/throttled render\n   (or no-JS) always shows content. The entrance animates transform only —\n   worst case the element sits 18px low but fully visible. */\n.reveal { opacity: 1; }\n.reveal.in { animation: revealIn .72s cubic-bezier(.2,.7,.2,1) backwards; }\n.reveal.in[data-d=\"1\"] { animation-delay: .07s; }\n.reveal.in[data-d=\"2\"] { animation-delay: .15s; }\n.reveal.in[data-d=\"3\"] { animation-delay: .23s; }\n@keyframes revealIn { from { opacity: .35; transform: translateY(18px); } }\n\n@media (prefers-reduced-motion: reduce) {\n  * { animation-duration: .001ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }\n  .reveal, .reveal.in { opacity: 1; transform: none; animation: none; }\n}\n\n/* ============================================================\n   RESPONSIVE\n   ============================================================ */\n@media (max-width: 980px) {\n  .hero__grid { grid-template-columns: 1fr; }\n  .console { max-width: 480px; }\n  .dossier { grid-template-columns: repeat(2, 1fr); }\n  .pillars { grid-template-columns: 1fr; }\n  .how { grid-template-columns: 1fr; }\n  .mentor { grid-template-columns: 1fr; }\n  .mentor__photo { max-width: 360px; }\n  .proof { grid-template-columns: 1fr; }\n}\n@media (max-width: 720px) {\n  .nav__links { display: none; }\n  body { font-size: 17px; }\n}\n@media (max-width: 480px) {\n  .dossier { grid-template-columns: 1fr; }\n  .console__stats { grid-template-columns: 1fr 1fr; }\n  .choices { grid-template-columns: 1fr; }\n  .capture { flex-direction: column; }\n  .capture .btn { width: 100%; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ===================== NAV ===================== -->\n<header class=\"nav\">\n  <div class=\"wrap nav__inner\">\n    <a class=\"brand\" href=\"#top\">\n      <span class=\"brand__mark\"><\u002Fspan>\n      HIGH&nbsp;AGENCY\n    <\u002Fa>\n    <nav class=\"nav__right\">\n      <div class=\"nav__links\">\n        <a href=\"#problem\">The Problem<\u002Fa>\n        <a href=\"#system\">The System<\u002Fa>\n        <a href=\"#proof\">Proof<\u002Fa>\n        <a href=\"#faq\">FAQ<\u002Fa>\n      <\u002Fdiv>\n      <button class=\"btn btn--primary nav__cta\" data-apply=\"\">Apply<\u002Fbutton>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main id=\"top\">\n\n<!-- ===================== HERO ===================== -->\n<section class=\"hero\" data-screen-label=\"Hero\">\n  <div class=\"wrap hero__grid\">\n    <div class=\"hero__copy\">\n      <div class=\"eyebrow hero__tag reveal\"><span class=\"dot\"><\u002Fspan>Founding Batch 01 · By application only<\u002Fdiv>\n      <h1 class=\"display reveal\" data-d=\"1\">\n        School is a<br><span class=\"strike\">waiting room.<\u002Fspan><br>You weren't built<br>to wait.\n      <\u002Fh1>\n      <p class=\"lead hero__sub reveal\" data-d=\"2\">\n        High Agency is a selective cohort for ambitious young operators who'd rather <span class=\"serif-em\" style=\"color:var(--bone)\">build the thing<\u002Fspan> than study it. Find your tribe. Ship something real. Turn ambition into momentum.\n      <\u002Fp>\n      <form class=\"capture reveal\" data-d=\"2\" data-capture=\"\">\n        <div class=\"capture__field\">\n          <span class=\"pre mono\">↳<\u002Fspan>\n          <input type=\"email\" name=\"email\" placeholder=\"you@email.com\" autocomplete=\"email\" aria-label=\"Email address\">\n        <\u002Fdiv>\n        <button type=\"submit\" class=\"btn btn--primary\">Request Access <span class=\"arr\">→<\u002Fspan><\u002Fbutton>\n      <\u002Fform>\n      <div class=\"capture__note reveal\" data-d=\"3\">\n        <span><b>By application.<\u002Fb> We read every one.<\u002Fspan>\n        <span><b>Founding batch — free to join.<\u002Fb><\u002Fspan>\n        <span>Ages 13–19.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- console -->\n    <aside class=\"console reveal\" data-d=\"2\" aria-hidden=\"true\">\n      <div class=\"console__head\">\n        <span class=\"kicker\">Operational Status<\u002Fspan>\n        <span class=\"live\"><span class=\"blip\"><\u002Fspan>LIVE<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"radar\">\n        <div class=\"radar__cross\"><\u002Fdiv>\n        <div class=\"radar__sweep\"><\u002Fdiv>\n        <span class=\"radar__pip\" style=\"left:64%;top:30%\"><\u002Fspan>\n        <span class=\"radar__pip\" style=\"left:38%;top:58%\"><\u002Fspan>\n        <span class=\"radar__pip\" style=\"left:72%;top:66%\"><\u002Fspan>\n        <span class=\"radar__pip\" style=\"left:50%;top:44%\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"console__stats\">\n        <div class=\"cstat\"><div class=\"cstat__n\" data-count=\"6\">0<\u002Fdiv><div class=\"cstat__l\">Units forming<\u002Fdiv><\u002Fdiv>\n        <div class=\"cstat\"><div class=\"cstat__n\"><span data-count=\"100\">0<\u002Fspan><span class=\"ig\">%<\u002Fspan><\u002Fdiv><div class=\"cstat__l\">By application<\u002Fdiv><\u002Fdiv>\n        <div class=\"cstat\"><div class=\"cstat__n\"><span class=\"ig\">$<\u002Fspan><span data-count=\"0\">0<\u002Fspan><\u002Fdiv><div class=\"cstat__l\">Cost to found<\u002Fdiv><\u002Fdiv>\n        <div class=\"cstat\"><div class=\"cstat__n\" data-count=\"50\">0<\u002Fdiv><div class=\"cstat__l\">Founding seats<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ticker\">\n        <span class=\"arrow\">▸<\u002Fspan>\n        <span class=\"ticker__feed\" id=\"ticker\">Operator from London just requested access<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- proof strip -->\n<div class=\"strip\">\n  <div class=\"wrap strip__inner reveal\">\n    <span class=\"strip__label\">Operators building from<\u002Fspan>\n    <span class=\"strip__item\">Stanford<\u002Fspan>\n    <span class=\"strip__item\">MIT<\u002Fspan>\n    <span class=\"strip__item\">High schools<\u002Fspan>\n    <span class=\"strip__item\">Dorm rooms<\u002Fspan>\n    <span class=\"strip__item\">Garages<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===================== PROBLEM ===================== -->\n<section class=\"section\" id=\"problem\" data-screen-label=\"Problem\">\n  <div class=\"wrap\">\n    <div class=\"shead\">\n      <div class=\"eyebrow reveal\"><span class=\"dot\"><\u002Fspan>The diagnosis<\u002Fdiv>\n      <h2 class=\"h2 reveal\" data-d=\"1\">The system is optimized for the wrong outcome.<\u002Fh2>\n      <p class=\"lead reveal\" data-d=\"2\">Conventional education rewards conformity and obedience. The real world rewards originality, leverage and nerve. The gap between them has never been wider — and AI is widening it by the week.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"dossier reveal\" data-d=\"1\">\n      <div class=\"stat\">\n        <div class=\"stat__n\">75<span class=\"u\">%<\u002Fspan><\u002Fdiv>\n        <div class=\"stat__d\">of graduates feel unprepared to make real career decisions.<\u002Fdiv>\n        <span class=\"stat__tag\">01<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"stat__n\">3<span class=\"u\">/4<\u002Fspan><\u002Fdiv>\n        <div class=\"stat__d\">of students say school feels meaningless.<\u002Fdiv>\n        <span class=\"stat__tag\">02<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"stat__n\">22<span class=\"u\">%<\u002Fspan><\u002Fdiv>\n        <div class=\"stat__d\">report a strong sense of purpose in what they do.<\u002Fdiv>\n        <span class=\"stat__tag\">03<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"stat__n\">&lt;10<span class=\"u\">%<\u002Fspan><\u002Fdiv>\n        <div class=\"stat__d\">of universities have integrated any AI literacy.<\u002Fdiv>\n        <span class=\"stat__tag\">04<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"problem__punch reveal\" data-d=\"2\">\n      You already know this. <span class=\"serif-em ig\">The question is whether you'll keep waiting for permission<\u002Fspan> — or go build.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"divider\"><\u002Fdiv>\n\n<!-- ===================== THE SYSTEM / PILLARS ===================== -->\n<section class=\"section\" id=\"system\" data-screen-label=\"What you get\">\n  <div class=\"wrap\">\n    <div class=\"shead\">\n      <div class=\"eyebrow eyebrow--ignite reveal\"><span class=\"dot\"><\u002Fspan>What you join<\u002Fdiv>\n      <h2 class=\"h2 reveal\" data-d=\"1\">Not school. Not tutoring.<br>A launchpad.<\u002Fh2>\n      <p class=\"lead reveal\" data-d=\"2\">Three systems, working together to convert raw ambition into shipped reality.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pillars\">\n      <article class=\"pillar reveal\" data-d=\"1\">\n        <div class=\"pillar__glow\"><\u002Fdiv>\n        <div class=\"pillar__no\">SYSTEM 01<\u002Fdiv>\n        <div class=\"pillar__ic\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M12 2C9 6 7 8 7 13a5 5 0 0 0 10 0c0-2-1-3.5-2-5-.5 1.5-1.5 2-2.5 2 .5-3-.5-6-.5-8Z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"h3\">Ignition<\u002Fh3>\n        <p>Live, expert-led workshops and mentor office hours that get you moving — and keep you moving. Learn directly from people who've actually done the thing, not lectured about it.<\u002Fp>\n        <span class=\"pillar__tag\">Mentorship layer · <b>Premium, later<\u002Fb><\u002Fspan>\n      <\u002Farticle>\n\n      <article class=\"pillar reveal\" data-d=\"2\">\n        <div class=\"pillar__glow\"><\u002Fdiv>\n        <div class=\"pillar__no\">SYSTEM 02<\u002Fdiv>\n        <div class=\"pillar__ic\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"3.4\"><\u002Fcircle><path d=\"M12 3v3M12 18v3M3 12h3M18 12h3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"h3\">Operational Zone<\u002Fh3>\n        <p>A shared skill track of real-world milestones — ship an MVP, land your first user, hit your first $100 MRR. Progress is earned by doing real things and verified by a mentor, never by a quiz.<\u002Fp>\n        <span class=\"pillar__tag\">The skill track · <b>Free<\u002Fb><\u002Fspan>\n      <\u002Farticle>\n\n      <article class=\"pillar reveal\" data-d=\"3\">\n        <div class=\"pillar__glow\"><\u002Fdiv>\n        <div class=\"pillar__no\">SYSTEM 03<\u002Fdiv>\n        <div class=\"pillar__ic\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><circle cx=\"8\" cy=\"9\" r=\"3\"><\u002Fcircle><circle cx=\"16\" cy=\"9\" r=\"3\"><\u002Fcircle><path d=\"M3 19c0-2.8 2.2-5 5-5M21 19c0-2.8-2.2-5-5-5M9.5 19h5\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"h3\">Unit<\u002Fh3>\n        <p>Your tribe — a tight founding team of 5–6 operators building a real initiative alongside you. Streaks and accountability keep the whole Unit moving between sessions. You don't do this alone.<\u002Fp>\n        <span class=\"pillar__tag\">Your cohort · <b>Free<\u002Fb><\u002Fspan>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"divider\"><\u002Fdiv>\n\n<!-- ===================== HOW IT WORKS ===================== -->\n<section class=\"section\" data-screen-label=\"How it works\">\n  <div class=\"wrap how\">\n    <div class=\"how__copy\">\n      <div class=\"shead\" style=\"margin-bottom:0\">\n        <div class=\"eyebrow reveal\"><span class=\"dot\"><\u002Fspan>The loop<\u002Fdiv>\n        <h2 class=\"h2 reveal\" data-d=\"1\">Ambition in.<br>Momentum out.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"steps reveal\" data-d=\"2\">\n        <div class=\"step\">\n          <div class=\"step__n\">01<\u002Fdiv>\n          <div><h3 class=\"h3\">Apply &amp; get matched<\u002Fh3><p>Submit your profile. If you're a fit, you're placed into a Unit of operators on the same trajectory — or you found your own.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step\">\n          <div class=\"step__n\">02<\u002Fdiv>\n          <div><h3 class=\"h3\">Progress real milestones<\u002Fh3><p>Your Unit moves through a shared track of practical milestones in the real world. A mentor verifies each one — once, for the whole team.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step\">\n          <div class=\"step__n\">03<\u002Fdiv>\n          <div><h3 class=\"h3\">Ship something real<\u002Fh3><p>Build streaks. Bank wins. Walk away with a launched product, first revenue, and a network of people who get it.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- track map -->\n    <div class=\"track reveal\" data-d=\"2\" aria-hidden=\"true\">\n      <div class=\"track__head\">\n        <span class=\"track__title\">Unit · Skill Track<\u002Fspan>\n        <span class=\"live\"><span class=\"blip\"><\u002Fspan>IN PROGRESS<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"node done\"><span class=\"node__dot\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><path d=\"M5 12l5 5L19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan><span class=\"node__label\">Form your Unit<\u002Fspan><span class=\"node__meta\">Verified<\u002Fspan><\u002Fdiv>\n      <div class=\"node done\"><span class=\"node__dot\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><path d=\"M5 12l5 5L19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan><span class=\"node__label\">Define the initiative<\u002Fspan><span class=\"node__meta\">Verified<\u002Fspan><\u002Fdiv>\n      <div class=\"node active\"><span class=\"node__dot\"><\u002Fspan><span class=\"node__label\">Ship your MVP<\u002Fspan><span class=\"node__meta\">Active<\u002Fspan><\u002Fdiv>\n      <div class=\"node locked\"><span class=\"node__dot\"><\u002Fspan><span class=\"node__label\">Land your first user<\u002Fspan><span class=\"node__meta\">Locked<\u002Fspan><\u002Fdiv>\n      <div class=\"node locked\"><span class=\"node__dot\"><\u002Fspan><span class=\"node__label\">First $100 MRR<\u002Fspan><span class=\"node__meta\">Locked<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"divider\"><\u002Fdiv>\n\n<!-- ===================== MENTOR ===================== -->\n<section class=\"section\" data-screen-label=\"Mentor\">\n  <div class=\"wrap mentor\">\n    <div class=\"mentor__photo reveal\">\n      <div class=\"ph\">\n        <svg class=\"ph__ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21c0-4 4-6 8-6s8 2 8 6\"><\u002Fpath><\u002Fsvg>\n        <span class=\"ph__t\">Photo · Joshua Newall<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"mentor__badge\">\n        <div class=\"nm\">Joshua Newall<\u002Fdiv>\n        <div class=\"rl\">Founder &amp; Lead Mentor · High Agency<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mentor__copy\">\n      <div class=\"eyebrow reveal\"><span class=\"dot\"><\u002Fspan>Who you learn from<\u002Fdiv>\n      <h2 class=\"h2 reveal\" data-d=\"1\">Mentors who've actually done it.<\u002Fh2>\n      <p class=\"lead reveal\" data-d=\"2\">The fastest way to compress a decade into a season is to build next to someone who's already walked the road. High Agency is led by operators with real range — and real receipts.<\u002Fp>\n      <div class=\"creds reveal\" data-d=\"2\">\n        <div class=\"cred\"><span class=\"cred__k\">Enterprise<\u002Fspan><span class=\"cred__v\">Guides Fortune 500 companies through tax &amp; compliance at scale.<\u002Fspan><\u002Fdiv>\n        <div class=\"cred\"><span class=\"cred__k\">Frontier<\u002Fspan><span class=\"cred__v\">Worked on space startups pushing real technical limits.<\u002Fspan><\u002Fdiv>\n        <div class=\"cred\"><span class=\"cred__k\">Research<\u002Fspan><span class=\"cred__v\">Published research background — rigor, not just hustle.<\u002Fspan><\u002Fdiv>\n        <div class=\"cred\"><span class=\"cred__k\">Mission<\u002Fspan><span class=\"cred__v\">Teaches young operators what school structurally can't.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"divider\"><\u002Fdiv>\n\n<!-- ===================== PROOF ===================== -->\n<section class=\"section\" id=\"proof\" data-screen-label=\"Proof\">\n  <div class=\"wrap\">\n    <div class=\"shead\">\n      <div class=\"eyebrow eyebrow--ignite reveal\"><span class=\"dot\"><\u002Fspan>Already in motion<\u002Fdiv>\n      <h2 class=\"h2 reveal\" data-d=\"1\">Real Units. Real output.<\u002Fh2>\n      <p class=\"lead reveal\" data-d=\"2\">We're early — and that's the point. The founding batch writes the origin story. Here's what's already on the board.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"proof\">\n      <article class=\"cohort reveal\" data-d=\"1\">\n        <div class=\"cohort__img\"><span class=\"cohort__badge\">Shipped<\u002Fspan><\u002Fdiv>\n        <div class=\"cohort__body\">\n          <h3>Canary OS<\u002Fh3>\n          <p>A six-person high-school Unit built an ML scam-detection model — a real, working product, not a class project.<\u002Fp>\n          <div class=\"cohort__foot\"><span>High-school Unit<\u002Fspan><span>6 operators<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"cohort reveal\" data-d=\"2\">\n        <div class=\"cohort__img\"><span class=\"cohort__badge\">Forming<\u002Fspan><\u002Fdiv>\n        <div class=\"cohort__body\">\n          <h3>The Frontier Units<\u002Fh3>\n          <p>Units forming with students from Stanford and MIT — operators already optimizing for leverage over grades.<\u002Fp>\n          <div class=\"cohort__foot\"><span>Stanford · MIT<\u002Fspan><span>Recruiting<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"cohort reveal\" data-d=\"3\">\n        <div class=\"cohort__img\"><span class=\"cohort__badge\">Open<\u002Fspan><\u002Fdiv>\n        <div class=\"cohort__body\">\n          <h3>Your Unit<\u002Fh3>\n          <p>The next seat is unclaimed. Apply to join a forming Unit — or found your own and recruit your team.<\u002Fp>\n          <div class=\"cohort__foot\"><span>Founding batch 01<\u002Fspan><span>By application<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <div class=\"honest reveal\">\n      <p><span class=\"serif-em\">\"We're not selling a finished thing.<\u002Fspan> We're inviting you to build the thing — and the proof — with us. Early is the advantage.\"<\u002Fp>\n      <button class=\"btn btn--ghost\" data-apply=\"\">Claim a seat <span class=\"arr\">→<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== COMPETITION TEASER ===================== -->\n<section class=\"section\" data-screen-label=\"Competition\">\n  <div class=\"wrap\">\n    <div class=\"compete reveal\">\n      <span class=\"compete__roadmap\">On the roadmap<\u002Fspan>\n      <div class=\"eyebrow eyebrow--ignite\" style=\"margin-bottom:20px\"><span class=\"dot\"><\u002Fspan>What's coming<\u002Fdiv>\n      <h2 class=\"h2\">Unit vs. Unit.<\u002Fh2>\n      <p class=\"lead\">Soon, cohorts compete on what actually matters — shipped outcomes, revenue, real traction. Live leaderboards. Demo days. Winning Units earn the rooms most people never get into.<\u002Fp>\n      <div class=\"board\">\n        <div class=\"board__row lead-row\"><span class=\"board__rank\">01<\u002Fspan><span class=\"board__team\">Canary OS<\u002Fspan><span class=\"board__score\">▲ 1,240 pts<\u002Fspan><\u002Fdiv>\n        <div class=\"board__row\"><span class=\"board__rank\">02<\u002Fspan><span class=\"board__team board__blur\">████ Unit<\u002Fspan><span class=\"board__score board__blur\">▲ 1,090<\u002Fspan><\u002Fdiv>\n        <div class=\"board__row\"><span class=\"board__rank\">03<\u002Fspan><span class=\"board__team board__blur\">█████ Unit<\u002Fspan><span class=\"board__score board__blur\">▲ 980<\u002Fspan><\u002Fdiv>\n        <div class=\"board__row\"><span class=\"board__rank\">04<\u002Fspan><span class=\"board__team board__blur\">███ Unit<\u002Fspan><span class=\"board__score board__blur\">▲ 875<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"divider\"><\u002Fdiv>\n\n<!-- ===================== FAQ ===================== -->\n<section class=\"section\" id=\"faq\" data-screen-label=\"FAQ\">\n  <div class=\"wrap\">\n    <div class=\"shead\" style=\"text-align:center;margin-left:auto;margin-right:auto\">\n      <div class=\"eyebrow reveal\" style=\"margin-bottom:18px\"><span class=\"dot\"><\u002Fspan>Before you apply<\u002Fdiv>\n      <h2 class=\"h2 reveal\" data-d=\"1\">Questions, answered straight.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"faq reveal\" data-d=\"1\">\n      <div class=\"qa\">\n        <button class=\"qa__q\">Who is this actually for?<span class=\"qa__plus\"><\u002Fspan><\u002Fbutton>\n        <div class=\"qa__a\"><p>Ambitious people roughly 13–19 who'd rather build than wait. You don't need to be technical, rich, or \"qualified.\" You need genuine drive and a willingness to do real things in the real world. If you've ever felt school was too slow for you, you're who we're looking for.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"qa\">\n        <button class=\"qa__q\">Is it free?<span class=\"qa__plus\"><\u002Fspan><\u002Fbutton>\n        <div class=\"qa__a\"><p>The founding batch is completely free — cohorts, the skill track, community, and gamification stay free to maximize who can join. Down the line, the live mentorship layer (expert workshops + office hours) becomes a premium add-on. Everything that builds your tribe and momentum stays free.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"qa\">\n        <button class=\"qa__q\">How selective is it?<span class=\"qa__plus\"><\u002Fspan><\u002Fbutton>\n        <div class=\"qa__a\"><p>It's by application, and the founding batch is intentionally small. We read every application and care far more about trajectory and drive than your résumé. This isn't a course you buy your way into — it's a Unit you earn your way into.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"qa\">\n        <button class=\"qa__q\">Do I need a startup idea already?<span class=\"qa__plus\"><\u002Fspan><\u002Fbutton>\n        <div class=\"qa__a\"><p>No. Plenty of operators arrive with raw ambition and no idea yet. Your Unit and the skill track help you find the thing worth building — then actually build it. Showing up with momentum matters more than showing up with a pitch deck.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"qa\">\n        <button class=\"qa__q\">What's the time commitment?<span class=\"qa__plus\"><\u002Fspan><\u002Fbutton>\n        <div class=\"qa__a\"><p>Enough to build real momentum — think a live cadence of workshops plus the work your Unit does between sessions. Streaks and accountability are designed to keep you consistent without taking over your life. You get out what you put in.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"qa\">\n        <button class=\"qa__q\">I'm under 18. What about my parents?<span class=\"qa__plus\"><\u002Fspan><\u002Fbutton>\n        <div class=\"qa__a\"><p>If you're under 18, a parent or guardian gives consent before you get full access — it's a quick, required step we take seriously for safety and compliance. They don't run the experience; you do. We'll guide you both through it after you're accepted.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FINAL CTA ===================== -->\n<section class=\"section final\" data-screen-label=\"Final CTA\">\n  <div class=\"final__glow\"><\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"eyebrow eyebrow--ignite reveal\" style=\"justify-content:center\"><span class=\"dot\"><\u002Fspan>Founding Batch 01 · Applications open<\u002Fdiv>\n    <h2 class=\"reveal\" data-d=\"1\">Ambition is the<br>only prerequisite.<\u002Fh2>\n    <p class=\"lead reveal\" data-d=\"2\">Stop rehearsing for a life that isn't coming. Apply to the founding batch and turn what you've got into momentum — alongside people who move at your speed.<\u002Fp>\n    <form class=\"capture reveal\" data-d=\"2\" data-capture=\"\">\n      <div class=\"capture__field\">\n        <span class=\"pre mono\">↳<\u002Fspan>\n        <input type=\"email\" name=\"email\" placeholder=\"you@email.com\" autocomplete=\"email\" aria-label=\"Email address\">\n      <\u002Fdiv>\n      <button type=\"submit\" class=\"btn btn--primary\">Apply Now <span class=\"arr\">→<\u002Fspan><\u002Fbutton>\n    <\u002Fform>\n    <div class=\"capture__note reveal\" data-d=\"3\" style=\"justify-content:center\">\n      <span><b>By application.<\u002Fb> We read every one.<\u002Fspan>\n      <span><b>Free to join.<\u002Fb><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FOOTER ===================== -->\n<footer class=\"footer\">\n  <div class=\"wrap footer__inner\">\n    <a class=\"brand\" href=\"#top\"><span class=\"brand__mark\"><\u002Fspan>HIGH&nbsp;AGENCY<\u002Fa>\n    <div class=\"footer__links\">\n      <a href=\"#problem\">Problem<\u002Fa>\n      <a href=\"#system\">System<\u002Fa>\n      <a href=\"#proof\">Proof<\u002Fa>\n      <a href=\"#faq\">FAQ<\u002Fa>\n      <a href=\"#\" data-apply=\"\">Apply<\u002Fa>\n    <\u002Fdiv>\n    <small>© 2026 High Agency · Not school. Not tutoring. A launchpad.<\u002Fsmall>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fmain>\n\n<!-- ===================== APPLICATION MODAL ===================== -->\n<div class=\"modal\" id=\"modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"modalTitle\">\n  <div class=\"modal__scrim\" data-close=\"\"><\u002Fdiv>\n  <div class=\"modal__card\">\n    <button class=\"modal__close\" data-close=\"\" aria-label=\"Close\">✕<\u002Fbutton>\n    <div class=\"modal__progress\"><span class=\"on\"><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n\n    <!-- step 1 -->\n    <div class=\"modal__step active\" data-step=\"1\">\n      <h3 id=\"modalTitle\">Request access.<\u002Fh3>\n      <p class=\"modal__sub\">Founding Batch 01 is by application. Takes 60 seconds. We read every one.<\u002Fp>\n      <div class=\"field\">\n        <label for=\"m-name\">First name<\u002Flabel>\n        <input type=\"text\" id=\"m-name\" name=\"name\" placeholder=\"What do we call you?\" autocomplete=\"given-name\">\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label for=\"m-email\">Email<\u002Flabel>\n        <input type=\"email\" id=\"m-email\" name=\"email\" placeholder=\"you@email.com\" autocomplete=\"email\">\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label>Age band<\u002Flabel>\n        <div class=\"choices\" data-single=\"age\">\n          <div class=\"choice\" data-val=\"13–15\"><span class=\"tick\"><\u002Fspan>13–15<\u002Fdiv>\n          <div class=\"choice\" data-val=\"16–17\"><span class=\"tick\"><\u002Fspan>16–17<\u002Fdiv>\n          <div class=\"choice\" data-val=\"18–19\"><span class=\"tick\"><\u002Fspan>18–19<\u002Fdiv>\n          <div class=\"choice\" data-val=\"20+\"><span class=\"tick\"><\u002Fspan>20+<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"modal__err\" data-err=\"\">Fill in your name, a valid email, and your age band to continue.<\u002Fdiv>\n      <div class=\"modal__actions\">\n        <button class=\"btn btn--primary modal__next\" data-next=\"\">Continue <span class=\"arr\">→<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- step 2 -->\n    <div class=\"modal__step\" data-step=\"2\">\n      <h3>Two questions.<\u002Fh3>\n      <p class=\"modal__sub\">This is what your future Unit reads. Be real — drive reads louder than polish.<\u002Fp>\n      <div class=\"field\">\n        <label for=\"m-build\">What are you building — or what do you want to build?<\u002Flabel>\n        <textarea id=\"m-build\" name=\"building\" placeholder=\"A product, a project, a company, a skill… or raw ambition with no idea yet. All valid.\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label for=\"m-bold\">What's the most ambitious thing you've done so far?<\u002Flabel>\n        <textarea id=\"m-bold\" name=\"boldest\" placeholder=\"Shipped something, ran something, taught yourself something, cold-emailed someone… show us your nerve.\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <div class=\"modal__err\" data-err=\"\">Give us a sentence on each — that's all we need.<\u002Fdiv>\n      <div class=\"modal__actions\">\n        <button class=\"btn btn--ghost modal__back\" data-back=\"\">←<\u002Fbutton>\n        <button class=\"btn btn--primary modal__next\" data-next=\"\">Submit application <span class=\"arr\">→<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- step 3 success -->\n    <div class=\"modal__step\" data-step=\"3\">\n      <div class=\"success\">\n        <div class=\"success__seal\">\n          <svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M5 12l5 5L19 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Application logged.<\u002Fh3>\n        <p class=\"modal__sub\" style=\"margin-bottom:0\">You're in the queue for Founding Batch 01. We read every application by hand — if there's a fit, you'll hear from us about your Unit.<\u002Fp>\n        <div class=\"success__id\">OPERATOR ID · <b id=\"opId\">HA-000<\u002Fb><\u002Fdiv>\n        <div class=\"success__q\">Position in queue <span class=\"n\" id=\"queuePos\">—<\u002Fspan><\u002Fdiv>\n        <div class=\"modal__actions\" style=\"margin-top:30px\">\n          <button class=\"btn btn--ghost btn--block\" data-close=\"\">Close<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"1f959a93-cf3e-429f-a540-5193fd1a3665\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
